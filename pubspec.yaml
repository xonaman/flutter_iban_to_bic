name: iban_to_bic
description: Determines the SWIFT BIC of an IBAN (AT, BE, DE, ES, FR, LT, LU, NL). Zero runtime dependencies.
version: 2.2.0
homepage: https://github.com/xonaman/flutter_iban_to_bic

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  assets:
    - assets/bank_codes/at.json
    - assets/bank_codes/be.json
    - assets/bank_codes/de.json
    - assets/bank_codes/es.json
    - assets/bank_codes/fr.json
    - assets/bank_codes/lt.json
    - assets/bank_codes/lu.json
    - assets/bank_codes/nl.json
