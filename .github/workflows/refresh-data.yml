name: Refresh bank-code datasets

on:
  schedule:
    # Every Monday 04:00 UTC. Bundesbank publishes quarterly; other sources
    # are mostly monthly — weekly is a good compromise between freshness and
    # CI noise.
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      countries:
        description: 'Space-separated country codes (blank = all)'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run refresh script
        env:
          # Repo-level variable, updated each quarter when Bundesbank rotates
          # the download URL.
          BUNDESBANK_BLZ_URL: ${{ vars.BUNDESBANK_BLZ_URL }}
        run: |
          dart run tool/refresh_data.dart ${{ inputs.countries }}

      - name: Run tests against refreshed data
        run: flutter test

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- assets/bank_codes; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR with refreshed data
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: chore/refresh-bank-codes
          title: 'chore: refresh bank-code datasets'
          commit-message: 'chore: refresh bank-code datasets'
          body: |
            Automated refresh from the upstream authoritative sources.

            Generated by `.github/workflows/refresh-data.yml` using
            `tool/refresh_data.dart`. Tests were run against the new data
            before this PR was opened.
          labels: data-refresh
          delete-branch: true
